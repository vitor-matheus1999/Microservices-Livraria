services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres@local
      POSTGRES_DB: books-service
    ports:
      - "5435:5432"
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-service
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - ./data/jaeger:/badger # Persistência relativa para os traces coletados
  keycloak-service:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --http-port=8080
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db-keycloak
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres@local
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"
      - "7443:7443"
    depends_on:
      - db
    networks:
      - keycloak-network
volumes:
  postgres_data:

networks:
    keycloak-network:
        driver: bridge