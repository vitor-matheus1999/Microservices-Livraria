info:
  name: Create Author
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/author"
  body:
    type: json
    data: |-
      {
        "firstName":"Rafael",
        "lastName":"Lange"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
