name: CI payment-service (self-hosted)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted, linux, docker, payment-service]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner: $RUNNER_NAME"
          uname -a
          docker --version
          node --version
          npm --version

      - name: Build Docker sem cache
        run: docker compose build

      - name: Subir stack Docker
        run: docker compose up -d --force-recreate

      - name: Status Docker
        run: docker compose ps
